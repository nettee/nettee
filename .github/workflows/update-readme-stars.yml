name: Update README stars

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 5'

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update star counts in README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            const readmePath = 'README.md'
            const readme = fs.readFileSync(readmePath, 'utf8')
            const lines = readme.split('\n')

            const formatStars = (count) => {
              if (count >= 1_000_000) {
                const value = (count / 1_000_000).toFixed(1).replace(/\.0$/, '')
                return `${value}m`
              }

              if (count >= 1_000) {
                const value = (count / 1_000).toFixed(1).replace(/\.0$/, '')
                return `${value}k`
              }

              return String(count)
            }

            const repoRegex = /\[([^\]]+)\]\(https:\/\/github\.com\/([^/]+)\/([^/)]+)\)/
            let changed = false

            for (let i = 0; i < lines.length; i += 1) {
              const line = lines[i]
              if (!line.startsWith('| [')) continue

              const match = line.match(repoRegex)
              if (!match) continue

              const [, , owner, repo] = match
              const { data } = await github.rest.repos.get({ owner, repo })
              const stars = `⭐ ${formatStars(data.stargazers_count)}`
              const cells = line.split('|')

              if (cells.length < 4) continue

              const currentStars = cells[cells.length - 2].trim()
              if (currentStars === stars) continue

              cells[cells.length - 2] = ` ${stars} `
              lines[i] = cells.join('|')
              changed = true
            }

            if (!changed) {
              core.info('README star counts are already up to date.')
              return
            }

            fs.writeFileSync(readmePath, `${lines.join('\n').replace(/\n$/, '')}\n`)
            core.info('README star counts updated.')

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update README star counts'
          branch: main
          file_pattern: README.md
